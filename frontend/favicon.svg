<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- subtle drop shadow similar to your bitmap -->
    <filter id="ds" x="-25%" y="-25%" width="160%" height="160%">
      <feDropShadow dx="10" dy="12" stdDeviation="6" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Red ring + white center -->
  <circle cx="256" cy="256" r="212" fill="#fff" stroke="#d81f1f" stroke-width="56"/>

  <!-- Letters -->
  <!-- Rule applied: Q and M are xxx of S size and positioned so all stay inside the white circle -->
  <g filter="url(#ds)" font-family="Georgia, 'Times New Roman', Times, serif" font-weight="700">
    <!-- S (reference size) -->
    <text x="122" y="212" font-size="136" fill="#0b0f1f">S</text>

    <!-- Q (80% of S) -->
    <text x="187" y="294" font-size="136" fill="#6f7684">Q</text>

    <!-- M (80% of S) -->
    <text x="282" y="368" font-size="124" fill="#0b0f1f">M</text>
  </g>
</svg>